<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Basic Details</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#eef4ff;
    padding:40px;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0px 8px 30px rgba(0,0,0,0.1);
}

h1{
    color:#1e3a8a;
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/3;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#1e293b;
}

input, select, textarea{
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
}

input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0px 0px 8px rgba(37,99,235,0.3);
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn{
    background:#2563eb;
    color:white;
}

.submit-btn:hover{
    background:#1e40af;
}

.home-btn{
    background:#e2e8f0;
}

.home-btn:hover{
    background:#cbd5e1;
}

@media(max-width:700px){

.form-grid{
    grid-template-columns:1fr;
}

.form-group.full{
    grid-column:1/2;
}

}

</style>

</head>

<body>

<div class="container">

    <h1>Basic Student Details</h1>

    <form action="StudentMain" method="post">

        <div class="form-grid">

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" name="student_id" required>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone">
            </div>

            <div class="form-group">
                <label>Gender</label>

                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group full">
                <label>Address</label>
                <textarea rows="5" name="address"></textarea>
            </div>

        </div>

        <div class="buttons">

            <button type="submit" class="submit-btn">Save Details</button>

            <button type="button" class="home-btn" onclick="window.location.href='home.html'">
                Back To Home
            </button>

        </div>

    </form>

</div>

</body>
</html>
