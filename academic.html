<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:#eff6ff; padding:40px; }
.container{ width:90%; max-width:850px; margin:auto; background:white; padding:40px; border-radius:20px; box-shadow:0 8px 25px rgba(0,0,0,0.1); }
.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
h1{ color:#1d4ed8; }
.nav-home{ text-decoration:none; color:#2563eb; font-weight:600; font-size:14px; }
.nav-home:hover{ text-decoration:underline; }

.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:25px; }
.form-group{ display:flex; flex-direction:column; }
label{ margin-bottom:8px; font-weight:600; color:#1e293b; }
input, select{ padding:14px; border-radius:10px; border:1px solid #cbd5e1; font-size:15px; transition:0.2s; }
input:focus, select:focus{ outline:none; border-color:#2563eb; box-shadow:0 0 8px rgba(37,99,235,0.3); }
input.error-field, select.error-field{ border-color:#ef4444; }
.field-error{ color:#ef4444; font-size:12px; margin-top:5px; display:none; }
.field-error.show{ display:block; }

.buttons{ margin-top:30px; display:flex; gap:20px; }
button{ padding:14px 28px; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; }
.submit-btn{ background:#2563eb; color:white; }
.submit-btn:hover{ background:#1e40af; }
.home-btn{ background:#e2e8f0; color:#1e293b; }
.home-btn:hover{ background:#cbd5e1; }

.toast{ position:fixed; bottom:30px; right:30px; padding:16px 24px; border-radius:12px; font-weight:600; font-size:15px; z-index:999; display:none; }
.toast.show{ display:block; animation:slideIn 0.4s ease; }
.toast.success{ background:#22c55e; color:white; }
.toast.error{ background:#ef4444; color:white; }
@keyframes slideIn{ from{ transform:translateX(100px); opacity:0; } to{ transform:translateX(0); opacity:1; } }

@media(max-width:700px){
.form-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>Academic Details</h1>
        <a href="home.html" class="nav-home">← Back to Home</a>
    </div>

    <form id="academicForm" action="AcademicMain" method="post" novalidate>
        <div class="form-grid">

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" name="student_id" id="student_id" placeholder="e.g. STU001">
                <span class="field-error" id="err_student_id">Student ID is required.</span>
            </div>

            <div class="form-group">
                <label>Branch</label>
                <select name="branch" id="branch">
                    <option value="">-- Select Branch --</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Electronics & Communication</option>
                    <option>Electrical Engineering</option>
                    <option>Mechanical Engineering</option>
                    <option>Civil Engineering</option>
                </select>
                <span class="field-error" id="err_branch">Please select a branch.</span>
            </div>

            <div class="form-group">
                <label>Year</label>
                <select name="year" id="year">
                    <option value="">-- Select Year --</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>
                <span class="field-error" id="err_year">Please select a year.</span>
            </div>

            <div class="form-group">
                <label>Section</label>
                <select name="section" id="section">
                    <option value="">-- Select Section --</option>
                    <option>A</option>
                    <option>B</option>
                    <option>C</option>
                    <option>D</option>
                </select>
                <span class="field-error" id="err_section">Please select a section.</span>
            </div>

            <div class="form-group">
                <label>CGPA</label>
                <input type="number" name="cgpa" id="cgpa" step="0.01" min="0" max="10" placeholder="0.00 – 10.00">
                <span class="field-error" id="err_cgpa">Enter a valid CGPA (0–10).</span>
            </div>

            <div class="form-group">
                <label>Admission Year</label>
                <input type="number" name="admission_year" id="admission_year" placeholder="e.g. 2022" min="2000" max="2100">
                <span class="field-error" id="err_admission_year">Enter a valid admission year.</span>
            </div>

            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" name="roll_number" id="roll_number" placeholder="e.g. 22CS001">
                <span class="field-error" id="err_roll_number">Roll number is required.</span>
            </div>

            <div class="form-group">
                <label>Attendance (%)</label>
                <input type="number" name="attendance" id="attendance" step="0.1" min="0" max="100" placeholder="0 – 100">
                <span class="field-error" id="err_attendance">Enter a valid attendance percentage.</span>
            </div>

        </div>

        <div class="buttons">
            <button type="submit" class="submit-btn">Save Academic Details</button>
            <button type="button" class="home-btn" onclick="window.location.href='adminHome.html'">Back To Home</button>
        </div>
    </form>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(window.location.search);
const status = params.get('status');
const toast = document.getElementById('toast');
function showToast(msg, type){
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 4000);
}
if(status === 'success') showToast('✅ Academic details saved!', 'success');
if(status === 'error') showToast('❌ Something went wrong. Please try again.', 'error');

document.getElementById('academicForm').addEventListener('submit', function(e){
    let valid = true;

    function validate(id, errId, condition){
        const el = document.getElementById(id);
        const err = document.getElementById(errId);
        if(condition){ el.classList.add('error-field'); err.classList.add('show'); valid = false; }
        else { el.classList.remove('error-field'); err.classList.remove('show'); }
    }

    const sid = document.getElementById('student_id').value.trim();
    const branch = document.getElementById('branch').value;
    const year = document.getElementById('year').value;
    const section = document.getElementById('section').value;
    const cgpa = parseFloat(document.getElementById('cgpa').value);
    const admYear = parseInt(document.getElementById('admission_year').value);
    const roll = document.getElementById('roll_number').value.trim();
    const att = parseFloat(document.getElementById('attendance').value);

    validate('student_id','err_student_id', sid === '');
    validate('branch','err_branch', branch === '');
    validate('year','err_year', year === '');
    validate('section','err_section', section === '');
    validate('cgpa','err_cgpa', isNaN(cgpa) || cgpa < 0 || cgpa > 10);
    validate('admission_year','err_admission_year', isNaN(admYear) || admYear < 2000 || admYear > 2100);
    validate('roll_number','err_roll_number', roll === '');
    validate('attendance','err_attendance', isNaN(att) || att < 0 || att > 100);

    if(!valid){ e.preventDefault(); showToast('⚠️ Please fix the errors before submitting.', 'error'); }
});
</script>
</body>
</html>
