<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academic Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg-dark:#070b1d;
    --bg-card:rgba(17,25,40,0.75);

    --purple:#a855f7;
    --cyan:#06b6d4;
    --gold:#f59e0b;

    --text:#f8fafc;
    --muted:#94a3b8;
}

select option{

    background:#111827;

    color:white;
}

body{

    display:flex;

    min-height:100vh;

    background:
    linear-gradient(
    135deg,
    #050816,
    #111827);

    font-family:'Poppins',sans-serif;

    color:white;
}

input,
select,
textarea{

    padding:16px;

    border-radius:14px;

    border:1px solid rgba(255,255,255,0.1);

    background:rgba(255,255,255,0.05);

    color:white;

    font-size:15px;

    transition:0.3s;
}

select option{

    background:#111827;

    color:white;
}
/* ================= SIDEBAR ================= */

.sidebar{

    width:260px;

    background:
    rgba(10,14,39,0.95);

    border-right:
    1px solid rgba(255,255,255,0.08);

    padding:40px 20px;

    position:fixed;

    height:100vh;
}

.logo{

    font-size:32px;

    font-weight:700;

    margin-bottom:60px;

    font-family:'Space Grotesk',sans-serif;
}

.logo span{

    color:var(--purple);
}

.menu{

    display:flex;

    flex-direction:column;

    gap:15px;
}

.menu a{

    text-decoration:none;

    color:#cbd5e1;

    padding:16px;

    border-radius:14px;

    transition:0.3s;

    display:flex;

    align-items:center;

    gap:14px;
}

.menu a:hover{

    background:
    rgba(168,85,247,0.15);

    color:white;

    transform:translateX(5px);
}

.menu i{

    color:var(--purple);
}

/* ================= MAIN ================= */

.main{

    margin-left:260px;

    width:100%;

    padding:50px;
}

.topbar{

    margin-bottom:40px;
}

.topbar h1{

    font-size:45px;

    font-family:'Space Grotesk',sans-serif;

    background:
    linear-gradient(
    135deg,
    var(--gold),
    var(--purple));

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* ================= FORM CONTAINER ================= */

.form-container{

    background:var(--bg-card);

    border:
    1px solid rgba(168,85,247,0.15);

    border-radius:24px;

    padding:40px;

    backdrop-filter:blur(12px);
}

/* ================= GRID ================= */

.form-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:30px;
}

/* ================= INPUTS ================= */

.form-group{

    display:flex;

    flex-direction:column;
}

.form-group label{

    margin-bottom:12px;

    color:#dbeafe;

    font-weight:500;
}

.form-group input,
.form-group select{

    padding:16px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.08);

    background:
    rgba(255,255,255,0.04);

    color:white;

    font-size:15px;

    transition:0.3s;
}

.form-group input:focus,
.form-group select:focus{

    outline:none;

    border-color:var(--purple);

    box-shadow:
    0 0 20px rgba(168,85,247,0.25);
}

/* ================= BUTTONS ================= */

.buttons{

    margin-top:40px;

    display:flex;

    gap:20px;
}

.submit-btn{

    padding:16px 35px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
    135deg,
    var(--purple),
    var(--cyan));

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.submit-btn:hover{

    transform:translateY(-4px);

    box-shadow:
    0 15px 25px rgba(168,85,247,0.25);
}

.back-btn{

    padding:16px 35px;

    border:none;

    border-radius:16px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    cursor:pointer;

    transition:0.3s;
}

.back-btn:hover{

    background:
    rgba(255,255,255,0.15);
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

    <div class="logo">

        Admin<span>Panel</span>

    </div>

    <div class="menu">

        <a href="adminHome.html">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </a>

        <a href="basic.html">

            <i class="fa-solid fa-user-plus"></i>

            Add Student

        </a>

        <a href="ViewStudents">

            <i class="fa-solid fa-users"></i>

            View Students

        </a>

        <a href="analytics.html">

            <i class="fa-solid fa-chart-line"></i>

            Analytics

        </a>

        <a href="LogoutServlet">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </a>

    </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

    <div class="topbar">

        <h1>📘 Academic Dashboard</h1>

    </div>

    <div class="form-container">

        <form action="AcademicMain"
        method="post">

            <div class="form-grid">

                <div class="form-group">

                    <label>Student ID</label>

                    <input type="text"
                    name="student_id"
                    placeholder="Enter Student ID">

                </div>

                <div class="form-group">

                    <label>Branch</label>

                    <select name="branch">

                        <option>Computer Science</option>

                        <option>Information Technology</option>

                        <option>Electronics</option>

                        <option>Mechanical</option>

                        <option>Civil</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Year Of Study</label>

                    <select name="year_of_study">

                        <option>1st Year</option>

                        <option>2nd Year</option>

                        <option>3rd Year</option>

                        <option>4th Year</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Section</label>

                    <select name="section">

                        <option>A</option>

                        <option>B</option>

                        <option>C</option>

                        <option>D</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>CGPA</label>

                    <input type="number"
                    step="0.01"
                    name="cgpa"
                    placeholder="Enter CGPA">

                </div>

                <div class="form-group">

                    <label>Attendance</label>

                    <input type="number"
                    name="attendance"
                    placeholder="Attendance %">

                </div>

                <div class="form-group">

                    <label>Roll Number</label>

                    <input type="text"
                    name="roll_number"
                    placeholder="Enter Roll Number">

                </div>

                <div class="form-group">

                    <label>Admission Year</label>

                    <input type="number"
                    name="admission_year"
                    placeholder="Enter Admission Year">

                </div>

            </div>

            <div class="buttons">

                <button type="submit"
                class="submit-btn">

                    Save Academic Details

                </button>

                <button type="button"
                class="back-btn"
                onclick="window.location.href='adminHome.html'">

                    Back To Home

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
